{{ define "main" }}
<section class="bg-[var(--bg-page)] dark:bg-[#0b0c0c] transition-colors duration-300">
    {{ partial "blocks/hero.html" . }}
</section>

<section class="bg-[var(--bg-page)] transition-colors duration-300 min-h-[calc(100vh-var(--header-height))] flex flex-col justify-center border-b border-[var(--border-main)]">
    <div class="moduk-width-container h-full">
        <div class="max-w-6xl mx-auto w-full py-12">
            <!-- MAIN CONTENT -->
            <div class="space-y-16">
                <div class="inset-text">
                    <p class="text-xl leading-relaxed m-0 ">
                        {{ .Description }}
                    </p>
                </div>

                <div class="intelligence-body prose prose-xl max-w-none dark:prose-invert 
                            prose-headings:font-bold prose-headings:mb-8
                            prose-p:mb-8 prose-p:leading-relaxed">
                    {{ .Content }}
                </div>

                <!-- Institutional Footer -->
                <div class="pt-20 border-t-4 border-mod-grey-3 dark:border-mod-grey-1 opacity-60">
                    <div class="flex justify-between items-center font-mono text-[10px] font-bold uppercase tracking-[0.3em] text-mod-grey-2">
                        <span class="text-mod-purple">Registry: UKSFTA-{{ upper (substr (sha256 .Title) 0 12) }}</span>
                        <span>Permanent Tactical Record</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{{ end }}
