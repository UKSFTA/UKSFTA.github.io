{{ define "main" }}
<section class="bg-[var(--bg-page)] dark:bg-[#0b0c0c] transition-colors duration-300">
    {{ partial "blocks/hero.html" . }}
</section>

<section class="bg-[var(--bg-page)] transition-colors duration-300 min-h-[calc(100vh-var(--header-height))] flex flex-col justify-center border-b border-[var(--border-main)]">
    <article class="moduk-width-container h-full">
        <div class="max-w-6xl mx-auto w-full py-12">
            <!-- MAIN CONTENT -->
            <div class="space-y-16">
                <!-- Executive Summary -->
                <div class="inset-text">
                    <p class="text-xl leading-relaxed m-0">
                        {{ .Description | default .Summary }}
                    </p>
                </div>

                <!-- Page Content -->
                <div class="intelligence-body prose prose-xl max-w-none dark:prose-invert
                            prose-headings:font-bold prose-headings:mb-8
                            prose-p:mb-8 prose-p:leading-relaxed">
                    {{ .Content }}
                </div>

                <!-- Registry Footer -->
                <div class="pt-20 border-t-4 border-[#2fb060]/20">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-12 opacity-60">
                        <div class="flex flex-col font-mono text-[10px] font-bold uppercase tracking-[0.3em]">
                            <span class="text-[#2fb060]">Registry: UKSFTA-{{ upper (substr (sha256 .Title) 0 12) }}</span>
                            <span class="mt-2 block">Institutional Record // G6_COMMUNICATIONS</span>
                        </div>
                        <span class="text-[10px] font-mono font-bold uppercase tracking-[0.3em] bg-[#0b0c0c] text-white px-4 py-2">Status: Permanent Archival</span>
                    </div>
                </div>
            </div>
        </div>
    </article>
</section>
{{ end }}
