<div class="tactical-map-container relative w-full h-full bg-[#001a2e] overflow-hidden group/map select-none shadow-2xl flex items-center justify-center">
    <!-- Institutional Coordinate Grid -->
    <div class="absolute inset-0 z-0 opacity-[0.05] pointer-events-none" style="background-image: 
        linear-gradient(to right, white 1px, transparent 1px), 
        linear-gradient(to bottom, white 1px, transparent 1px); 
        background-size: 80px 80px;">
    </div>

    {{ $map := resources.Get "icons/UKSF-MAP.png" }}
    {{ if $map }}
    <div class="relative z-10 w-full h-full flex items-center justify-center p-4">
        <img src="{{ $map.RelPermalink }}" class="w-full h-full object-contain no-invert opacity-80 transition-all duration-700 drop-shadow-[0_0_50px_rgba(0,0,0,0.5)]" alt="UKSF Tactical Map">
        
        <!-- Subtle Scanline Layer -->
        <div class="absolute inset-0 bg-white/[0.02] pointer-events-none" style="background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 100% 4px;"></div>
    </div>
    {{ else }}
    <div class="text-mod-red font-mono text-xs uppercase tracking-widest animate-pulse">
        G2_MAP_DATA_UNAVAILABLE
    </div>
    {{ end }}
</div>

<style>
@keyframes scan {
    from { transform: translateY(-100%); }
    to { transform: translateY(200%); }
}
</style>
