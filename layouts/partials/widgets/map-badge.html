<div class="strategic-badge-card flex flex-col items-center pointer-events-auto h-full w-full">
    <div class="bg-white/90 backdrop-blur-sm border-[1.5px] border-tactical-grey shadow-lg flex flex-col items-center w-full h-full overflow-hidden transition-all group-hover/map:border-mod-purple">
        <!-- Title Bar -->
        <div class="w-full py-1 px-1.5 border-b-[1.5px] border-tactical-grey text-center bg-mod-grey-3/50 backdrop-blur-md">
            <span class="text-[9px] lg:text-[11px] font-industrial font-black text-tactical-grey uppercase tracking-tighter leading-none block truncate">{{ .name }}</span>
        </div>
        <!-- Icon Container -->
        <div class="flex-grow p-2 lg:p-3 flex items-center justify-center w-full bg-white/40 overflow-hidden">
            {{ $icon := resources.Get .icon }}
            {{ if $icon }}
                <img src="{{ $icon.RelPermalink }}" class="max-w-full max-h-full object-contain no-invert" alt="{{ .name }}">
            {{ else }}
                <div class="w-full h-full bg-black/5 flex items-center justify-center text-[8px] text-black/20">??</div>
            {{ end }}
        </div>
    </div>
</div>
